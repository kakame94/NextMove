<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextMove CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748b;
  --slate-400: #94a3b8;
  --slate-300: #cbd5e1;
  --slate-200: #e2e8f0;

  --blue-600: #2563eb;
  --blue-500: #3b82f6;
  --blue-400: #60a5fa;

  --red-500: #ef4444; --red-400: #f87171;
  --green-500: #22c55e; --green-400: #4ade80;
  --yellow-500: #eab308; --yellow-400: #facc15;

  --bg: var(--slate-900);
  --surface: rgba(30, 41, 59, 0.6);
  --elevated: rgba(51, 65, 85, 0.4);
  --border: rgba(51, 65, 85, 0.5);
  --border-hover: rgba(71, 85, 105, 0.5);

  --radius: 12px;
  --sans: 'Manrope', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: #fff; font-family: var(--sans); -webkit-font-smoothing: antialiased; font-size: 14px; overflow: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--slate-700); border-radius: 6px; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; border: none; cursor: pointer; }
input { font-family: inherit; }

/* SHELL */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sb { width: 224px; background: var(--slate-900); border-right: 1px solid rgba(30, 41, 59, 1); display: flex; flex-direction: column; flex-shrink: 0; }
.sb-brand { padding: 20px; border-bottom: 1px solid var(--border); }
.brand-text { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, var(--blue-400), #c084fc); -webkit-background-clip: text; color: transparent; display: inline-block; }
.sb-nav { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.nav-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; font-size: 14px; color: var(--slate-400); transition: all 0.15s; cursor: pointer; background: transparent; text-align: left; }
.nav-item:hover { background: var(--surface); color: var(--slate-200); }
.nav-item.on { background: rgba(37, 99, 235, 0.15); color: var(--blue-400); font-weight: 600; }
.nav-item .lucide { width: 18px; height: 18px; }
.bdg { margin-left: auto; width: 20px; height: 20px; background: var(--red-500); border-radius: 50%; font-size: 10px; font-weight: 800; color: #fff; display: flex; align-items: center; justify-content: center; }

/* AGENT PROFILE */
.sb-foot { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }

/* MAIN */
.mn { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: rgba(15, 23, 42, 1); }
.hd { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.hd h1 { font-size: 18px; font-weight: 800; }
.hd-actions { display: flex; align-items: center; gap: 12px; }
.search-box { position: relative; }
.search-box .lucide { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--slate-500); width: 16px; height: 16px; }
.search-box input { padding: 8px 16px 8px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: #fff; outline: none; width: 224px; transition: border-color 0.15s; }
.search-box input:focus { border-color: rgba(59, 130, 246, 0.5); }
.icon-btn { position: relative; width: 36px; height: 36px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--slate-400); transition: all 0.15s; }
.icon-btn:hover { color: #fff; }

/* VIEWS */
.vw { display: none; padding: 24px; overflow-y: auto; flex: 1; }
.vw.on { display: block; animation: fadeUp 0.3s ease-out; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* STAT CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.stat-card .top { display: flex; align-items: center; justify-content: space-between; }
.stat-card .icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(51, 65, 85, 0.5); display: flex; align-items: center; justify-content: center; color: var(--slate-400); }
.stat-card .val { font-size: 24px; font-weight: 800; color: #fff; margin-top: 8px; }
.stat-card .lbl { font-size: 12px; color: var(--slate-400); }
.delta { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 2px; }
.delta.up { color: var(--green-400); }
.delta.dn { color: var(--red-400); }
.delta .lucide { width: 14px; height: 14px; }

/* PANELS */
.pnl { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.sh { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

/* AVATAR */
.av { width: 32px; height: 32px; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
.av.lg { width: 40px; height: 40px; font-size: 14px; }
.av.sm { width: 28px; height: 28px; font-size: 10px; }

/* BADGES */
.badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 12px; display: inline-flex; align-items: center; gap: 4px; }
.b-red { background: rgba(239, 68, 68, 0.15); color: var(--red-400); }
.b-yellow { background: rgba(234, 179, 8, 0.15); color: var(--yellow-400); }
.b-green { background: rgba(34, 197, 94, 0.15); color: var(--green-400); }
.b-blue { background: rgba(59, 130, 246, 0.15); color: var(--blue-400); }
.b-slate { background: rgba(100, 116, 139, 0.15); color: var(--slate-400); }

/* TABLES / LISTS */
.list-item { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 12px; border: 1px solid transparent; transition: all 0.15s; cursor: pointer; }
.list-item:hover { background: rgba(51, 65, 85, 0.3); border-color: var(--border-hover); }
.tr-info { flex: 1; min-width: 0; }
.tr-name { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tr-sub { font-size: 12px; color: var(--slate-400); margin-top: 4px; display: flex; align-items: center; gap: 12px; }
.tr-sub .lucide { width: 12px; height: 12px; }
.tr-right { text-align: right; flex-shrink: 0; }

/* FILTERS */
.filters { display: flex; gap: 8px; margin-bottom: 16px; }
.btn-f { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; background: var(--elevated); border: 1px solid var(--border); color: var(--slate-400); transition: all 0.15s; }
.btn-f:hover { border-color: var(--border-hover); }
.btn-f.on { background: rgba(37, 99, 235, 0.15); border-color: rgba(59, 130, 246, 0.3); color: var(--blue-400); }

/* GRID LAYOUTS */
.cg-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.cg-prospects { display: flex; gap: 20px; height: 100%; }
.pros-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.pros-detail { width: 360px; flex-shrink: 0; }

/* CHAT */
.cvg { display: flex; height: calc(100vh - 120px); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
.cv-list { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.cv-head { padding: 12px; }
.cv-search { position: relative; }
.cv-search .lucide { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--slate-500); width: 14px; height: 14px; }
.cv-search input { width: 100%; padding: 8px 12px 8px 32px; background: rgba(51, 65, 85, 0.4); border: 1px solid rgba(71, 85, 105, 0.3); border-radius: 8px; font-size: 12px; color: #fff; outline: none; }
.cv-items { flex: 1; overflow-y: auto; }
.cvi { display: flex; align-items: center; gap: 12px; padding: 16px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.1s; border-bottom: 1px solid var(--border); }
.cvi:hover { background: rgba(51, 65, 85, 0.2); }
.cvi.on { background: rgba(51, 65, 85, 0.4); border-left-color: var(--blue-500); }

.cv-chat { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4); }
.chat-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(30, 41, 59, 0.4); }
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.chat-input { padding: 16px; border-top: 1px solid var(--border); background: rgba(30, 41, 59, 0.3); display: flex; gap: 8px; }
.m-row { display: flex; }
.m-row.ag { justify-content: flex-end; }
.bubble { max-width: 70%; padding: 10px 16px; font-size: 13px; line-height: 1.5; border-radius: 16px; }
.m-row.ag .bubble { background: var(--blue-600); color: #fff; border-bottom-right-radius: 4px; }
.m-row.pr .bubble { background: rgba(51, 65, 85, 0.6); color: var(--slate-200); border-bottom-left-radius: 4px; }
.btn-primary { background: var(--blue-600); color: #fff; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: background 0.15s; }
.btn-primary:hover { background: var(--blue-500); }

.emp { text-align: center; padding: 40px; color: var(--slate-500); font-size: 13px; }
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-brand">
    <span class="brand-text">Immo CRM</span>
  </div>
  <div class="sb-nav">
    <button class="nav-item on" id="n-dash" onclick="go('dash')"><i data-lucide="layout-dashboard"></i> Tableau de bord</button>
    <button class="nav-item" id="n-pros" onclick="go('pros')"><i data-lucide="users"></i> Prospects</button>
    <button class="nav-item" id="n-conv" onclick="go('conv')"><i data-lucide="message-square"></i> Conversations <span class="bdg" id="cb" style="display:none">0</span></button>
    <button class="nav-item" id="n-rel" onclick="go('rel')"><i data-lucide="bell"></i> Relances <span class="bdg" id="rb" style="display:none;background:var(--yellow-500)">0</span></button>
    <button class="nav-item" id="n-qa" onclick="go('qa')"><i data-lucide="check-circle-2"></i> QA Agent <span class="bdg" id="qab" style="display:none;background:var(--green-500)">—</span></button>
  </div>
  <div class="sb-foot">
    <div class="av" style="background:var(--blue-600)">JA</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600;color:#fff">Joanel A.</div>
      <div style="font-size:10px;color:var(--slate-500)">Agent immobilier</div>
    </div>
  </div>
</aside>

<!-- MAIN APP -->
<main class="mn">
  <header class="hd">
    <h1 id="hd-title">Tableau de bord</h1>
    <div class="hd-actions">
      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" placeholder="Recherche globale...">
      </div>
      <button class="icon-btn" onclick="load()" title="Rafraîchir"><i data-lucide="refresh-cw"></i></button>
      <button class="icon-btn" title="Paramètres"><i data-lucide="settings"></i></button>
    </div>
  </header>

  <!-- DASHBOARD -->
  <div id="v-dash" class="vw on">
    <div class="kpi-grid">
      <div class="stat-card">
        <div class="top"><div class="icon"><i data-lucide="users" size="20"></i></div><span class="delta up"><i data-lucide="arrow-up-right"></i> +12%</span></div>
        <div class="val" id="sp">—</div>
        <div class="lbl">Prospects actifs</div>
      </div>
      <div class="stat-card">
        <div class="top"><div class="icon"><i data-lucide="message-square" size="20"></i></div></div>
        <div class="val" id="sm">—</div>
        <div class="lbl">Messages IA</div>
      </div>
      <div class="stat-card">
        <div class="top"><div class="icon"><i data-lucide="star" size="20"></i></div></div>
        <div class="val" id="sq">—</div>
        <div class="lbl">Qualifiés</div>
      </div>
      <div class="stat-card">
        <div class="top"><div class="icon"><i data-lucide="calendar" size="20"></i></div></div>
        <div class="val" id="sr">—</div>
        <div class="lbl" id="srs">Rendez-vous prévus</div>
      </div>
    </div>
    
    <div class="cg-2">
      <!-- Latest prospects -->
      <div class="pnl" style="display:flex;flex-direction:column">
        <div class="sh">Derniers prospects <div class="filters" id="df" style="margin:0"></div></div>
        <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px" id="dt"></div>
      </div>
      <!-- Right panel -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="pnl">
          <div class="sh">Prochaines relances</div>
          <div id="drl" style="display:flex;flex-direction:column;gap:8px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROSPECTS -->
  <div id="v-pros" class="vw">
    <div class="filters" id="pf" style="margin-bottom:20px"></div>
    <div class="cg-prospects">
      <div class="pros-list" id="pt"></div>
      <div id="pd" style="display:none"></div>
    </div>
  </div>

  <!-- CONVERSATIONS -->
  <div id="v-conv" class="vw" style="padding:16px 24px">
    <div class="cvg">
      <div class="cv-list">
        <div class="cv-head">
          <div class="cv-search"><i data-lucide="search"></i><input type="text" placeholder="Rechercher..."></div>
        </div>
        <div class="cv-items" id="cl"></div>
      </div>
      <div class="cv-chat">
        <div class="chat-head" id="ch">
          <span style="font-size:13px;color:var(--slate-400)">Sélectionnez une conversation</span>
        </div>
        <div class="chat-body" id="cm"></div>
      </div>
    </div>
  </div>

  <!-- RELANCES -->
  <div id="v-rel" class="vw">
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn-primary"><i data-lucide="plus" size="16"></i> Nouvelle relance</button></div>
    <div style="display:flex;flex-direction:column;gap:8px" id="rt"></div>
  </div>

  <!-- QA AGENT -->
  <div id="v-qa" class="vw">
    <div class="kpi-grid" id="qak"></div>
    <div class="pnl" style="margin-bottom:16px">
      <div class="sh">Détail du dernier run</div>
      <div style="display:flex;flex-direction:column;gap:8px" id="qad"></div>
    </div>
    <div class="pnl">
      <div class="sh">Historique des runs</div>
      <div style="display:flex;flex-direction:column;gap:8px" id="qah"></div>
    </div>
  </div>

</main>
</div>

<script>
const SB='https://fhqybnkxqfvbsjvwrcob.supabase.co';
const REAL_K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZocXlibmt4cWZ2YnNqdndyY29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MjA1MDksImV4cCI6MjA5MTQ5NjUwOX0.X90HjDpeuQiYNYIbM5j87hL1TfYvsT8Xq2th8-U8Jfg';
const H={'apikey':REAL_K,'Authorization':`Bearer ${REAL_K}`,'Accept':'application/json'};

async function q(t,p=''){
  try{ return await(await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:H})).json() }
  catch(e){ return [] }
}

let P=[],S=[],R=[],Q=[],sel=null,selPros=null;

// Make Icons render helper
const drawIcons = () => { if(window.lucide) window.lucide.createIcons(); };

async function load(){
  P=await q('prospects','select=*&order=created_at.desc'); if(!Array.isArray(P)) P=[];
  const c=await q('n8n_chat_histories','select=id,session_id,message&order=id.asc');
  if(Array.isArray(c)){
    const m={};
    c.forEach(x=>{if(!m[x.session_id])m[x.session_id]=[]; m[x.session_id].push(x)});
    S=Object.entries(m).map(([sid,msgs])=>({sid,msgs,p:P.find(p=>p.telephone===sid)||null}));
  }
  R=await q('relances','select=*,prospects(prenom,nom,telephone)&order=date_prevue.asc'); if(!Array.isArray(R)) R=[];
  Q=await q('eval_results','select=*&order=created_at.desc&limit=100'); if(!Array.isArray(Q)) Q=[];
  
  sts(); dT('all'); dR(); qaBadge(); pV('all');
  if(sel) { cL(); cM(); }
  drawIcons();
}

const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const ago=d=>{
  if(!d)return'—';const m=Math.floor((Date.now()-new Date(d))/6e4);
  if(m<1)return'À l\\'instant';if(m<60)return m+' min';
  const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'j';
};
const fd=d=>{
  if(!d)return'—';
  return new Date(d).toLocaleDateString('fr-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).replace(',', '');
};
const nm=p=>[p?.prenom,p?.nom].filter(Boolean).join(' ')||p?.telephone||'Inconnu';
const ini=n=>{ const pts=n.split(' '); return pts.length>1 ? (pts[0][0]+pts[1][0]).toUpperCase() : n.substring(0,2).toUpperCase(); };

const bdgMap = (s) => {
  if(['pu','urgent'].includes(s) || s>=9) return {l:'Urgent', c:'b-red', ic:'alert-circle'};
  if(['ph','chaud'].includes(s) || s>=7) return {l:'Chaud', c:'b-yellow', ic:'flame'};
  if(['pw','tiede'].includes(s) || s>=4) return {l:'Tiède', c:'b-blue', ic:'thermometer'};
  return {l:'Froid', c:'b-slate', ic:'snowflake'};
};

const stMap = (s) => {
  const map = {
    'qualifie': {l:'Qualifié', c:'b-green'},
    'nouveau': {l:'Nouveau', c:'b-blue'},
    'en_qualification': {l:'En qual.', c:'b-yellow'},
    'en_recherche': {l:'Recherche', c:'b-yellow'},
    'perdu': {l:'Perdu', c:'b-red'},
    'conclu': {l:'Conclu', c:'b-green'},
    'planifiee': {l:'Planifié', c:'b-blue'},
    'envoyee': {l:'Envoyé', c:'b-green'}
  };
  return map[s] || {l:s||'—', c:'b-slate'};
};

function avEl(name, score) {
  const col = score>=9 ? 'var(--red-500)' : score>=7 ? 'var(--yellow-500)' : score>=4 ? 'var(--blue-500)' : 'var(--slate-500)';
  return \`<div class="av" style="background:\${col}">\${ini(name)}</div>\`;
}

function sts(){
  const a=P.filter(p=>p.statut!=='perdu'&&p.statut!=='conclu');
  const qu=P.filter(p=>p.statut==='qualifie');
  const ms=S.reduce((s,x)=>s+x.msgs.length,0);
  const pe=R.filter(r=>r.statut==='planifiee');
  
  document.getElementById('sp').textContent=a.length;
  document.getElementById('sm').textContent=ms;
  document.getElementById('sq').textContent=qu.length;
  document.getElementById('sr').textContent=pe.length;
  document.getElementById('srs').textContent=pe.length?'Relances prévues':'Aucune relance';
  
  const b=document.getElementById('rb');
  if(pe.length){ b.textContent=pe.length; b.style.display='flex'; } else b.style.display='none';
}

function mkF(id,cb){
  document.getElementById(id).innerHTML=[['all','Tous'],['urgent','Urgent'],['hot','Chaud'],['warm','Tiède'],['cold','Froid']].map(([k,l])=>\`<button class="btn-f\${k==='all'?' on':''}" onclick="this.parentElement.querySelectorAll('.btn-f').forEach(b=>b.classList.remove('on'));this.classList.add('on');\${cb}('\${k}')">\${l}</button>\`).join('');
}
function ff(f){
  return f==='urgent'?p=>p.score_chaleur>=9:f==='hot'?p=>p.score_chaleur>=7&&p.score_chaleur<9:f==='warm'?p=>p.score_chaleur>=4&&p.score_chaleur<=6:f==='cold'?p=>p.score_chaleur<=3:()=>true;
}

function dT(f){
  const d=P.filter(ff(f)).slice(0,6);
  const el=document.getElementById('dt');
  if(!d.length){ el.innerHTML='<div class="emp">Aucun prospect.</div>'; return; }
  el.innerHTML=d.map(p=>{
    const st=stMap(p.statut);
    return \`<div class="list-item" onclick="sel='\${p.telephone}';go('conv')">
      \${avEl(nm(p), p.score_chaleur)}
      <div class="tr-info">
        <div class="tr-name">\${nm(p)}</div>
        <div class="tr-sub"><i data-lucide="tag"></i>\${p.type_projet||'Projet indéterminé'} &nbsp;&nbsp; <i data-lucide="clock"></i>\${ago(p.updated_at||p.created_at)}</div>
      </div>
      <div class="tr-right">
        <span class="badge \${st.c}">\${st.l}</span>
      </div>
    </div>\`;
  }).join('');
  drawIcons();
}

function dR(){
  const el=document.getElementById('drl'), pe=R.filter(r=>r.statut==='planifiee').slice(0,5);
  if(!pe.length){ el.innerHTML='<div class="emp" style="padding:20px">Aucune relance à venir.</div>'; return; }
  el.innerHTML=pe.map(r=>{
    return \`<div class="list-item" style="padding:10px">
      \${avEl(nm(r.prospects), 5)}
      <div class="tr-info">
        <div class="tr-name" style="font-size:13px">\${nm(r.prospects)}</div>
        <div class="tr-sub" style="font-size:11px">\${(r.type_relance||'').replace(/_/g,' ')}</div>
      </div>
      <div class="tr-right" style="font-size:11px;color:var(--slate-400)">
        \${fd(r.date_prevue)}
      </div>
    </div>\`;
  }).join('');
  drawIcons();
}

function setProsDetail(p) {
  const el = document.getElementById('pd');
  if(!p){ el.style.display='none'; return; }
  el.style.display='block';
  const st=stMap(p.statut);
  const th=bdgMap(p.score_chaleur);
  
  el.innerHTML = \`<div class="pnl" style="display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="av lg" style="background:var(--blue-600)">\${ini(nm(p))}</div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#fff">\${nm(p)}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <span class="badge \${st.c}">\${st.l}</span>
            <span class="badge \${th.c}"><i data-lucide="\${th.ic}"></i>\${th.l} (\${p.score_chaleur}/10)</span>
          </div>
        </div>
      </div>
      <button class="icon-btn" onclick="selPros=null;setProsDetail(null)"><i data-lucide="x"></i></button>
    </div>
    
    <div style="display:flex;flex-direction:column;gap:12px;font-size:13px;color:var(--slate-300);margin-top:8px">
      <div style="display:flex;align-items:center;gap:12px"><i data-lucide="phone" style="color:var(--slate-500)"></i> \${p.telephone||'—'}</div>
      <div style="display:flex;align-items:center;gap:12px"><i data-lucide="mail" style="color:var(--slate-500)"></i> Non renseigné</div>
      <div style="display:flex;align-items:center;gap:12px"><i data-lucide="map-pin" style="color:var(--slate-500)"></i> \${p.langue_preferee==='en'?'Anglais':'Français'}</div>
      <div style="display:flex;align-items:center;gap:12px"><i data-lucide="home" style="color:var(--slate-500)"></i> \${p.type_projet||'Projet non défini'}</div>
    </div>

    \${p.resume_ia?\`<div style="font-size:12px;color:var(--slate-300);line-height:1.6;padding-top:16px;border-top:1px solid var(--border)">
      <div style="font-weight:600;color:var(--slate-400);margin-bottom:6px;text-transform:uppercase;font-size:10px;letter-spacing:1px">Résumé IA</div>
      \${esc(p.resume_ia)}
    </div>\`:\`\`}

    <div style="padding-top:16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn-f" onclick="sel='\${p.telephone}';go('conv')" style="display:flex;align-items:center;justify-content:center;gap:6px"><i data-lucide="message-square" size="14"></i> Chat</button>
      <button class="btn-f" style="display:flex;align-items:center;justify-content:center;gap:6px"><i data-lucide="phone" size="14"></i> Appeler</button>
    </div>
  </div>\`;
  drawIcons();
}

function pV(f){
  const d=P.filter(ff(f));
  const pb = document.getElementById('pt');
  if(!d.length){ pb.innerHTML='<div class="emp">Aucun prospect trouvé.</div>'; return; }
  pb.innerHTML = d.map(p=>{
    const st=stMap(p.statut);
    const th=bdgMap(p.score_chaleur);
    return \`<div class="list-item" onclick="selPros='\${p.telephone}';setProsDetail(P.find(x=>x.telephone===selPros))">
      \${avEl(nm(p), p.score_chaleur)}
      <div class="tr-info">
        <div class="tr-name">\${nm(p)}</div>
        <div class="tr-sub"><i data-lucide="home"></i> \${p.type_projet||'Indéterminé'} &nbsp;&nbsp; <i data-lucide="phone"></i> \${p.telephone}</div>
      </div>
      <div class="tr-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div style="display:flex;gap:6px"><span class="badge \${st.c}">\${st.l}</span><span class="badge \${th.c}">\${th.l}</span></div>
        <span style="font-size:11px;color:var(--slate-400)">\${fd(p.created_at)}</span>
      </div>
    </div>\`;
  }).join('');
  drawIcons();
  if(selPros) setProsDetail(P.find(x=>x.telephone===selPros));
}

function cL(){
  const el=document.getElementById('cl');
  if(!S.length){ el.innerHTML='<div class="emp">Aucune conversation.</div>'; return; }
  el.innerHTML=S.map(s=>\`<div class="cvi \${sel===s.sid?'on':''}" onclick="sel='\${s.sid}';cL();cM()">
    <div style="position:relative">\${avEl(nm(s.p)||s.sid, s.p?.score_chaleur||0)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:600;color:#fff">\${nm(s.p)||s.sid}</span>
      </div>
      <p style="font-size:12px;color:var(--slate-400);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">\${esc((s.msgs[s.msgs.length-1]?.message?.content||'').substring(0,50))}</p>
    </div>
  </div>\`).join('');
}

function cM(){
  const s=S.find(x=>x.sid===sel);
  if(!s){ document.getElementById('ch').innerHTML='<span style="font-size:13px;color:var(--slate-400)">Sélectionnez une conversation.</span>'; document.getElementById('cm').innerHTML=''; return; }
  
  document.getElementById('ch').innerHTML=\`
    <div style="display:flex;align-items:center;gap:12px">
      \${avEl(nm(s.p)||s.sid, s.p?.score_chaleur||0)}
      <div>
        <div style="font-size:15px;font-weight:700;color:#fff">\${nm(s.p)||s.sid}</div>
        <div style="font-size:11px;color:var(--green-400);display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--green-400)"></span> En ligne via IA</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="icon-btn" onclick="selPros='\${s.p?.telephone}';go('pros')"><i data-lucide="user"></i></button>
      <button class="icon-btn"><i data-lucide="phone"></i></button>
    </div>
  \`;
  
  const el=document.getElementById('cm');
  el.innerHTML=\`
    <div style="text-align:center;font-size:11px;color:var(--slate-500);margin-bottom:12px">Début de la conversation</div>
    \${s.msgs.map((m, i)=>{
      const isAgent = m.message?.type!=='human';
      let prevAgent = false;
      if(i>0) prevAgent = s.msgs[i-1].message?.type!=='human';
      return \`<div class="m-row \${isAgent?'ag':'pr'}" style="\${i>0 && isAgent===prevAgent ? 'margin-top:-8px':''}">
      <div class="bubble">
        \${esc(m.message?.content||'')}
      </div>
    </div>\`}).join('')}
  \`;
  el.scrollTop=el.scrollHeight;
  drawIcons();
  
  if(!document.getElementById('c-in')) {
    const chatCont = el.parentElement;
    const inp = document.createElement('div');
    inp.id = 'c-in';
    inp.className = 'chat-input';
    inp.innerHTML = \`
      <button class="icon-btn" style="border:none;background:rgba(51, 65, 85, 0.5)"><i data-lucide="paperclip"></i></button>
      <input type="text" placeholder="Écrire un message..." style="flex:1;background:rgba(51, 65, 85, 0.4);border:1px solid var(--border);border-radius:8px;padding:0 16px;color:#fff;outline:none">
      <button class="btn-primary"><i data-lucide="send" size="16"></i></button>
    \`;
    chatCont.appendChild(inp);
    drawIcons();
  }
}

function rV(){
  const tb=document.getElementById('rt');
  if(!R.length){ tb.innerHTML='<div class="emp">Aucune relance configurée.</div>'; return; }
  tb.innerHTML=R.map(r=>{
    const st=stMap(r.statut);
    return \`<div class="list-item pnl">
      \${avEl(nm(r.prospects), 5)}
      <div class="tr-info">
        <div class="tr-name" style="font-size:14px">\${nm(r.prospects)}</div>
        <div class="tr-sub" style="font-size:12px;color:var(--slate-300)">\${r.contenu||(r.type_relance||'').replace(/_/g,' ')}</div>
      </div>
      <div style="width:120px;flex-shrink:0"><span style="font-family:var(--mono);font-size:11px;color:var(--slate-400)"><i data-lucide="calendar" size="12" style="display:inline;margin-right:4px;vertical-align:-2px"></i>\${fd(r.date_prevue)}</span></div>
      <div class="tr-right" style="width:100px">
        <span class="badge \${st.c}">\${st.l}</span>
      </div>
      <div class="tr-right" style="display:flex;gap:4px">
        <button class="icon-btn" style="width:28px;height:28px"><i data-lucide="check" size="14"></i></button>
        <button class="icon-btn" style="width:28px;height:28px"><i data-lucide="edit-3" size="14"></i></button>
      </div>
    </div>\`;
  }).join('');
  drawIcons();
}

/* QA RUNS */
function qaRuns(){
  const m={};
  Q.forEach(e=>{
    if(!m[e.run_id])m[e.run_id]={run_id:e.run_id,results:[],date:e.created_at};
    m[e.run_id].results.push(e);
    if(e.created_at>m[e.run_id].date)m[e.run_id].date=e.created_at;
  });
  return Object.values(m).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function qaBadge(){
  const runs=qaRuns();if(!runs.length)return;
  const last=runs[0];
  const avg=Math.round(last.results.reduce((s,r)=>s+r.score_global,0)/last.results.length);
  const b=document.getElementById('qab');
  b.textContent=avg; b.style.display='flex';
  b.style.background=avg>=90?'var(--green-500)':avg>=70?'var(--yellow-500)':'var(--red-500)';
}

function qaV(){
  const runs=qaRuns();
  const kel=document.getElementById('qak');
  if(!runs.length){
    kel.innerHTML='<div class="emp" style="grid-column:1/5">Aucun test qualité effectué.</div>';
    document.getElementById('qah').innerHTML='';
    document.getElementById('qad').innerHTML='';
    return;
  }
  const last=runs[0];
  const avg=Math.round(last.results.reduce((s,r)=>s+r.score_global,0)/last.results.length);
  const passed=last.results.filter(r=>r.passed).length;
  
  kel.innerHTML=\`
    <div class="stat-card">
      <div class="top"><div class="icon" style="background:var(--blue-600);color:#fff"><i data-lucide="activity"></i></div></div>
      <div class="val" style="color:\${avg>=90?'var(--green-400)':avg>=70?'var(--yellow-400)':'var(--red-400)'}">\${avg}<span style="font-size:14px;color:var(--slate-500)">/100</span></div>
      <div class="lbl">Score moyen du dernier run</div>
    </div>
    <div class="stat-card">
      <div class="top"><div class="icon"><i data-lucide="check-circle"></i></div></div>
      <div class="val">\${passed}<span style="font-size:14px;color:var(--slate-500)">/\${last.results.length}</span></div>
      <div class="lbl">Scénarios réussis</div>
    </div>
    <div class="stat-card">
      <div class="top"><div class="icon"><i data-lucide="clock"></i></div></div>
      <div class="val" style="font-size:18px">\${new Date(last.date).toLocaleDateString('fr-CA',{day:'numeric',month:'short'})}</div>
      <div class="lbl">\${new Date(last.date).toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>
    <div class="stat-card">
      <div class="top"><div class="icon"><i data-lucide="list"></i></div></div>
      <div class="val">\${runs.length}</div>
      <div class="lbl">Total de runs completés</div>
    </div>
  \`;
  
  const hel=document.getElementById('qah');
  hel.innerHTML=runs.slice(0,10).map(r=>{
    const a=Math.round(r.results.reduce((s,x)=>s+x.score_global,0)/r.results.length);
    const p=r.results.filter(x=>x.passed).length;
    const ok=p===r.results.length;
    return \`<div class="list-item">
      <div style="width:40px;height:40px;border-radius:8px;background:\${ok?'rgba(34,197,94,0.15)':'rgba(239,68,68,0.15)'};color:\${ok?'var(--green-400)':'var(--red-400)'};display:flex;align-items:center;justify-content:center"><i data-lucide="\${ok?'check':'x'}"></i></div>
      <div class="tr-info">
        <div class="tr-name">\${r.results.length} scénarios testés</div>
        <div class="tr-sub">\${fd(r.date)}</div>
      </div>
      <div class="tr-right">
        <div style="font-size:16px;font-weight:700;color:\${a>=90?'var(--green-400)':a>=70?'var(--yellow-400)':'var(--red-400)'}">\${a}/100</div>
        <div style="font-size:11px;color:var(--slate-400);margin-top:2px">\${p}/\${r.results.length} succès</div>
      </div>
    </div>\`;
  }).join('');
  
  const del=document.getElementById('qad');
  del.innerHTML=last.results.map(e=>{
    const ok=e.passed;
    const sCol=e.score_global>=90?'var(--green-400)':e.score_global>=70?'var(--yellow-400)':'var(--red-400)';
    return \`<div class="list-item" style="align-items:flex-start">
      <div style="width:24px;color:\${ok?'var(--green-400)':'var(--red-400)'};padding-top:2px"><i data-lucide="\${ok?'check-circle':'x-circle'}" size="18"></i></div>
      <div class="tr-info">
        <div class="tr-name" style="white-space:normal">\${esc(e.scenario_name)}</div>
        <div style="font-size:11px;color:var(--slate-400);text-transform:capitalize;margin:4px 0">\${esc((e.scenario_category||'').replace(/_/g,' '))}</div>
        \${e.judge_feedback?\`<div style="font-size:12px;color:var(--slate-300);background:rgba(15,23,42,0.4);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px">\${esc(e.judge_feedback)}</div>\`:\`\`}
      </div>
      <div class="tr-right">
        <span class="badge" style="background:\${ok?'rgba(34,197,94,0.15)':'rgba(239,68,68,0.15)'};color:\${sCol}">\${e.score_global}/100</span>
      </div>
    </div>\`;
  }).join('');
  
  drawIcons();
}

const titles = { 'dash':'Tableau de bord', 'pros':'Prospects', 'conv':'Conversations', 'rel':'Calendrier & Relances', 'qa':'Assurance Qualité Agent' };

function go(v){
  document.querySelectorAll('.vw').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  document.querySelectorAll('.nav-item').forEach(a=>a.classList.remove('on'));
  const btn = document.getElementById('n-'+v);
  if(btn) btn.classList.add('on');
  
  const hdTitle = document.getElementById('hd-title');
  if(hdTitle) hdTitle.textContent = titles[v] || 'NextMove';

  if(v==='pros'){mkF('pf','pV');pV('all');}
  if(v==='conv'){cL();cM();}
  if(v==='rel')rV();
  if(v==='qa')qaV();
}

mkF('df','dT');
load();
setInterval(load, 30000);
</script>
